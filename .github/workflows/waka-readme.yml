name: WakaTime Readme
     on:
       schedule:
         - cron: "0 0 * * 1"
       workflow_dispatch:
     jobs:
       update-readme:
         runs-on: ubuntu-latest
         steps:
           - uses: athul/waka-readme@master
             with:
               WAKATIME_API_KEY: ${{ secrets.WAKATIME_API_KEY }}
               SHOW_TITLE: true
               TIME_RANGE: last_7_days
               SHOW_TIME: true
